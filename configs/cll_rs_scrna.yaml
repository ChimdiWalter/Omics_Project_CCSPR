seed: 42
cache_dir: data/cache

dataset:
  data_path: data/cll_rs_scrna/data.h5ad
  label_key: time_group
  min_genes: 200
  min_cells: 3
  n_hvg: 2000
  n_pcs: 50
  max_cells: 120
  use_precomputed_pca: true

protocol:
  var_genes: 50
  n_splits: 2
  test_size: 0.25
  harmonic_params:
    mode: euclidean
    solver: l2
    k: 10
    iters: 0
    alpha: 0.5
    lambda_: 1.0e-6
    top_k: 20
    normalize: std
    n_boot: 1
    subsample_frac: 0.8
    rescale_median: 1.0
  eu_sparse_params:
    mode: euclidean
    solver: elastic
    k: 10
    iters: 0
    alpha: 0.5
    lambda_: 1.0e-6
    top_k: 20
    normalize: std
    n_boot: 1
    subsample_frac: 0.8
    rescale_median: 1.0
  ccspr_params:
    mode: ricci
    solver: elastic
    k: 10
    iters: 5
    alpha: 0.5
    lambda_: 1.0e-6
    top_k: 20
    normalize: std
    n_boot: 1
    subsample_frac: 0.8
    rescale_median: 1.0

ablation:
  var_genes: 50
  n_splits: 2
  test_size: 0.25
  grids:
    distance_mode: [euclidean, ricci]
    iters: [0, 2, 5, 10]
    k: [5, 10, 15]
    lambda: [1.0e-8, 1.0e-7, 1.0e-6, 1.0e-5, 1.0e-4]
    top_k: [10, 20, 50]
    normalize: [none, std]

output:
  results_dir: results/cll_rs_scrna
  global_figures_dir: results/figures
  global_tables_dir: results/tables
