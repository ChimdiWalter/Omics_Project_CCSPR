seed: 42
cache_dir: data/cache

dataset:
  data_path: data/cll_rs_scrna/data.h5ad
  label_key: label
  min_genes: 200
  min_cells: 3
  n_hvg: 1000
  n_pcs: 30
  max_cells: 600

protocol:
  var_genes: 1000
  n_splits: 1
  test_size: 0.25
  harmonic_params:
    mode: euclidean
    solver: l2
    k: 10
    iters: 0
    alpha: 0.5
    lambda_: 1.0e-6
    top_k: 20
    normalize: std
    n_boot: 2
    subsample_frac: 0.8
    rescale_median: 1.0
  ccspr_params:
    mode: ricci
    solver: elastic
    k: 10
    iters: 5
    alpha: 0.5
    lambda_: 1.0e-6
    top_k: 20
    normalize: std
    n_boot: 2
    subsample_frac: 0.8
    rescale_median: 1.0

ablation:
  var_genes: 1000
  n_splits: 1
  test_size: 0.25
  grids:
    distance_mode: [euclidean, ricci]
    iters: [0, 5]
    k: [10]
    lambda: [1.0e-6]
    top_k: [20]
    normalize: [std]

output:
  results_dir: results
  tag: cll_rs_scrna_gse165087
