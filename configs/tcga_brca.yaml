seed: 42
cache_dir: data/cache

dataset:
  root: data/tcga_brca
  download: false
  pca_expr: 100
  pca_meth: 100
  max_samples: 120

protocol:
  var_genes: 1000
  n_splits: 2
  test_size: 0.25
  harmonic_params:
    mode: euclidean
    solver: l2
    k: 10
    iters: 0
    alpha: 0.5
    lambda_: 1.0e-6
    top_k: 20
    normalize: std
    n_boot: 1
    subsample_frac: 0.8
    rescale_median: 1.0
  ccspr_params:
    mode: ricci
    solver: elastic
    k: 10
    iters: 5
    alpha: 0.5
    lambda_: 1.0e-6
    top_k: 20
    normalize: std
    n_boot: 1
    subsample_frac: 0.8
    rescale_median: 1.0

output:
  results_dir: results/brca
